<div class="container mt-4">

  <div *ngIf="wishlistItems.length === 0" class="text-center py-5">
    <i class="fa-regular fa-heart" style="font-size:48px; color:#ddd;"></i>
    <p class="text-muted mt-3">Your wishlist is empty</p>
    <a routerLink="/products" class="btn btn-dark mt-2">Continue Shopping</a>
  </div>

  <div *ngIf="wishlistItems.length > 0">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold mb-0">Wishlist ({{ wishlistItems.length }} items)</h5>
      <button class="btn btn-sm btn-outline-danger" (click)="clearWishlist()">Clear All</button>
    </div>

    <div class="row">
      <div class="col-md-3 mb-4" *ngFor="let item of wishlistItems">
        <div class="card h-100 text-center p-3" style="border-radius:12px;">

          <img [src]="item.image" style="height:160px; object-fit:contain;">

          <h6 class="mt-3" style="font-size:13px;">{{ item.title }}</h6>

          <p class="text-danger fw-bold">${{ item.price }}</p>

          <div class="d-flex gap-2 mt-auto">
            <button class="btn btn-dark w-50 btn-sm" (click)="addToCart(item)">
              Add to Cart
            </button>
            <button class="btn btn-outline-danger w-50 btn-sm" (click)="removeFromWishlist(item.id)">
              Remove
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>
