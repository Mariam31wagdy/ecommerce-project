<div class="container mt-5">

  <div *ngIf="cartItems.length === 0" class="text-center py-5">
    <p class="text-muted fs-5">No items in cart 😢</p>
    <a routerLink="/products" class="btn btn-dark mt-2">Continue Shopping</a>
  </div>

  <div *ngIf="cartItems.length > 0" class="row g-4">

    <div class="col-md-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">Cart ({{ cartItems.length }} items)</h5>
        <button class="btn btn-sm btn-outline-danger" (click)="clearCart()">Clear Cart</button>
      </div>

      <div class="border rounded-3 overflow-hidden">
        <div *ngFor="let item of cartItems; let i = index"
             class="d-flex align-items-center gap-3 p-3"
             style="border-bottom: 0.5px solid #eee;">

          <img [src]="item.image"
               style="width:70px;height:70px;object-fit:contain;background:#f8f8f8;border-radius:8px;padding:6px;flex-shrink:0;">

          <div class="flex-grow-1">
            <p class="mb-1 fw-bold" style="font-size:13px;">{{ item.title }}</p>
            <p class="text-danger fw-bold mb-2">${{ item.price }}</p>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-outline-dark btn-sm" (click)="decreaseQty(i)">−</button>
              <span class="fw-bold">{{ item.quantity || 1 }}</span>
              <button class="btn btn-outline-dark btn-sm" (click)="increaseQty(i)">+</button>
            </div>
          </div>

          <button class="btn btn-outline-danger btn-sm" (click)="removeItem(i)">Remove</button>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="p-4 rounded-3" style="background:#f8f8f8;">
        <h6 class="fw-bold mb-3">Order Summary</h6>
        <div class="d-flex justify-content-between text-muted mb-2" style="font-size:13px;">
          <span>Subtotal</span><span>${{ getTotal() }}</span>
        </div>
        <div class="d-flex justify-content-between text-muted mb-2" style="font-size:13px;">
          <span>Shipping</span><span>Free</span>
        </div>
        <div class="d-flex justify-content-between text-muted mb-3" style="font-size:13px;">
          <span>Tax</span><span>$0.00</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold mb-3">
          <span>Total</span><span>${{ getTotal() }}</span>
        </div>

        <!-- لو مش logged in -->
        <div *ngIf="!isLoggedIn" class="alert alert-warning text-center py-2 mb-3" style="font-size:13px;">
          🔒 Please <a routerLink="/login" class="fw-bold text-danger text-decoration-none">Login</a> to checkout
        </div>

        <button class="btn btn-dark w-100 py-2" (click)="checkout()">Checkout →</button>
        <a routerLink="/products" class="d-block text-center text-muted mt-2" style="font-size:12px;">
          ← Continue Shopping
        </a>
      </div>
    </div>

  </div>
</div>
