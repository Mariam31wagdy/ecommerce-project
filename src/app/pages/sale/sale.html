<div class="container mt-4">

  <div *ngIf="!isLoggedIn" class="text-center py-5">
    <i class="fa-solid fa-lock" style="font-size:48px; color:#ddd;"></i>
    <h4 class="mt-3 fw-bold">Members Only</h4>
    <p class="text-muted">Login to access exclusive sale deals!</p>
    <a routerLink="/login" class="btn btn-dark px-4">Login Now</a>
    <a routerLink="/register" class="btn btn-outline-dark px-4 ms-2">Register</a>
  </div>

  <div *ngIf="isLoggedIn">
    <h3 class="fw-bold mb-1">🔥 Sale</h3>
    <p class="text-muted mb-4">Exclusive deals for our members</p>

    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-2 text-muted">Loading sale products...</p>
    </div>

    <div class="row g-4" *ngIf="!loading">
      <div class="col-md-3 mb-4" *ngFor="let p of saleProducts">
        <div class="card h-100 text-center p-3" style="border-radius:12px;">
          <span class="badge bg-danger position-absolute m-2">SALE</span>
          <img [src]="p.image" style="height:160px; object-fit:contain;">
          <h6 class="mt-3" style="font-size:13px;">{{ p.title }}</h6>
          <p class="text-danger fw-bold">${{ p.price }}</p>
          <button class="btn btn-dark btn-sm" (click)="addToCart(p)">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

</div>
